<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Upload Labs</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #20293b;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
		<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--false fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script>
function mergeFiles(fileParts, onProgress) {
	return new Promise((resolve, reject) => {
		const buffers = [];
		function fetchPart(index) {
			if (index >= fileParts.length) {
				const totalLength = buffers.reduce((sum, buf) => sum + buf.byteLength, 0);
				const combined = new Uint8Array(totalLength);
				let offset = 0;
				for (const buf of buffers) { combined.set(new Uint8Array(buf), offset); offset += buf.byteLength; }
				resolve(new Blob([combined], { type: 'application/octet-stream' }));
				return;
			}
			fetch(fileParts[index])
				.then(r => { if (!r.ok) throw new Error('Failed to fetch: ' + fileParts[index]); return r.arrayBuffer(); })
				.then(data => { buffers.push(data); if (onProgress) onProgress(index + 1, fileParts.length); fetchPart(index + 1); })
				.catch(reject);
		}
		fetchPart(0);
	});
}

function getParts(file, totalParts) {
	return Array.from({ length: totalParts }, (_, i) => `${file}.part${i}`);
}

Promise.all([
	mergeFiles(getParts('index.pck', 3)),
	mergeFiles(getParts('index.wasm', 2)),
]).then(([pckBlob, wasmBlob]) => {
	const pckUrl  = URL.createObjectURL(pckBlob);
	const wasmUrl = URL.createObjectURL(wasmBlob);

	const origFetch = window.fetch;
	window.fetch = async function(url, ...args) {
		if (typeof url === 'string' && url.endsWith('index.pck'))  return origFetch(pckUrl,  ...args);
		if (typeof url === 'string' && url.endsWith('index.wasm')) return origFetch(wasmUrl, ...args);
		return origFetch(url, ...args);
	};

	const origOpen = XMLHttpRequest.prototype.open;
	XMLHttpRequest.prototype.open = function(method, url, ...rest) {
		if (typeof url === 'string' && url.includes('index.pck'))  url = pckUrl;
		if (typeof url === 'string' && url.includes('index.wasm')) url = wasmUrl;
		return origOpen.call(this, method, url, ...rest);
	};

	return new Promise((resolve, reject) => {
		const script = document.createElement('script');
		script.src = 'index.js';
		script.onload = resolve;
		script.onerror = reject;
		document.body.appendChild(script);
	});
}).then(() => {
	// index.js is now loaded — Engine is defined, intercepts are active
	const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":51676740,"index.wasm":36145869},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
	const GODOT_THREADS_ENABLED = false;
	const engine = new Engine(GODOT_CONFIG);

	const statusOverlay  = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice   = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) return;
		if (mode === 'hidden') { statusOverlay.remove(); initializing = false; return; }
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display   = mode === 'notice'   ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
		text.split('\n').forEach(line => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		setStatusNotice(err instanceof Error ? err.message : typeof err === 'string' ? err : 'An unknown error occurred.');
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let swPromise;
			try { swPromise = navigator.serviceWorker.getRegistration(); }
			catch (err) { swPromise = Promise.reject(new Error('Service worker registration failed.')); }
			Promise.race([
				swPromise.then(reg => {
					if (reg != null) return Promise.reject(new Error('Service worker already exists.'));
					return reg;
				}).then(() => engine.installServiceWorker()),
				new Promise(resolve => setTimeout(resolve, 2000)),
			]).then(() => window.location.reload())
			 .catch(err => console.error('Error while registering service worker:', err));
		} else {
			displayFailureNotice('Error\nThe following features required to run Godot projects on the Web are missing:\n' + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function(current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => setStatusMode('hidden'), displayFailureNotice);
	}
}).catch(err => {
	console.error('Failed to load game:', err);
	const notice = document.getElementById('status-notice');
	notice.textContent = 'Failed to load game files: ' + err.message;
	notice.style.display = 'block';
	document.getElementById('status').style.visibility = 'visible';
});
		</script>
	</body>
</html>
