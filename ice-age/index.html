<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Ice Age Baby Adventure</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
  </head>
  <body>
    <div class="webgl-content">
      <div id="unityContainer" style="width: 960px; height: 600px"></div>
      <div class="footer">
        <div class="webgl-logo"></div>
        <div class="fullscreen" onclick="unityInstance.SetFullscreen(1)"></div>
        <div class="title">Ice Age Baby Adventure</div>
      </div>
    </div>
  </body>
</html>

<script>
/* ================== CONFIG ================== */

const DATA_PREFIX = "data/Kill the Ice Age Baby Adventure The Game.data.unityweb.part";
const DATA_PARTS = 3;

/* ================== LOADING ================== */

async function fetchPart(url) {
  const res = await fetch(url);
  const buffer = await res.arrayBuffer();
  return new Uint8Array(buffer);
}

async function mergeParts(prefix, count) {
  const buffers = [];
  for (let i = 0; i < count; i++) {
    buffers.push(await fetchPart(prefix + i));
  }
  
  // Calculate total size
  const totalSize = buffers.reduce((sum, buf) => sum + buf.length, 0);
  const merged = new Uint8Array(totalSize);
  
  // Merge all parts
  let offset = 0;
  for (const buf of buffers) {
    merged.set(buf, offset);
    offset += buf.length;
  }
  
  return merged.buffer;
}

/* ================== UNITY BOOT ================== */

(async () => {
  // Merge data file parts
  const dataBuffer = await mergeParts(DATA_PREFIX, DATA_PARTS);

  // Store merged data in memory
  window.unityMergedData = {
    'Kill the Ice Age Baby Adventure The Game.data.unityweb': dataBuffer
  };

  // Intercept XMLHttpRequest to serve merged data
  const originalOpen = XMLHttpRequest.prototype.open;
  const originalSend = XMLHttpRequest.prototype.send;

  XMLHttpRequest.prototype.open = function(method, url, ...args) {
    this._url = url;
    return originalOpen.call(this, method, url, ...args);
  };

  XMLHttpRequest.prototype.send = function(...args) {
    const url = this._url;
    const filename = url ? decodeURIComponent(url.split('/').pop().split('?')[0]) : '';
    
    if (window.unityMergedData[filename]) {
      setTimeout(() => {
        Object.defineProperty(this, 'response', { value: window.unityMergedData[filename], writable: false });
        Object.defineProperty(this, 'responseType', { value: 'arraybuffer', writable: true });
        Object.defineProperty(this, 'status', { value: 200, writable: false });
        Object.defineProperty(this, 'readyState', { value: 4, writable: false });
        this.onload && this.onload();
      }, 0);
      return;
    }
    
    return originalSend.call(this, ...args);
  };

  // Load config and start Unity
  var unityInstance = UnityLoader.instantiate("unityContainer", "Build/Kill the Ice Age Baby Adventure The Game.json", {onProgress: UnityProgress});
})();
</script>

<script defer src="https://static.itch.io/htmlgame.js" type="text/javascript"></script>
