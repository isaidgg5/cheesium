<!DOCTYPE html>
<html lang="en-us">
<head>

  <title>Crimson Fantasia</title>
  <link rel="shortcut icon" href="../../images/ico.ico" type="image/x-icon">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: black;
    }
    #unity-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
    }
    #unity-canvas {
      width: 100vw;
      height: 100vh;
      background: #000;
    }
    #unity-loading-bar,
    #unity-footer,
    #unity-warning {
      position: absolute;
      left: 0;
      right: 0;
      text-align: center;
    }
    #unity-loading-bar { top: 40%; }
    #unity-footer { bottom: 10px; }
    #unity-warning { top: 10px; }
  </style>
</head>
<body>

<div id="unity-container">
  <canvas id="unity-canvas"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-progress-bar-empty" style="width: 100%; height: 24px; background: #333; border-radius: 12px; overflow: hidden; margin: 20px auto;">
      <div id="unity-progress-bar-full" style="height: 100%; width: 0%; background: #ff66cc;"></div>
    </div>
  </div>
  <div id="unity-warning" style="display:none;"></div>
  <div id="unity-footer">
    <button id="unity-fullscreen-button">Fullscreen</button>
  </div>
</div>
<script>
// ================== CONFIG ==================
const DATA_PREFIX = "Build/Crimson Fantasia [WebGL].data.part";
const DATA_PARTS = 3;
const WASM_PREFIX = "Build/Crimson Fantasia [WebGL].wasm.part";
const WASM_PARTS = 2;
const TOTAL_MB = 100.0;

const container = document.querySelector("#unity-container");
const canvas = document.querySelector("#unity-canvas");
const loadingBar = document.querySelector("#unity-loading-bar");
const progressBarFull = document.querySelector("#unity-progress-bar-full");
const fullscreenButton = document.querySelector("#unity-fullscreen-button");
const warningBanner = document.querySelector("#unity-warning");

function unityShowBanner(msg, type) {
  function updateBannerVisibility() {
    warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
  }
  var div = document.createElement('div');
  div.innerHTML = msg;
  warningBanner.appendChild(div);
  if (type == 'error') div.style = 'background: red; padding: 10px;';
  else {
    if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
    setTimeout(function() {
      warningBanner.removeChild(div);
      updateBannerVisibility();
    }, 5000);
  }
  updateBannerVisibility();
}

// ================== LOADING & MERGING ==================
let loadedBytes = 0;
async function fetchPart(url) {
  const res = await fetch(url);
  const reader = res.body.getReader();
  const chunks = [];
  let received = 0;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    chunks.push(value);
    received += value.length;
    loadedBytes += value.length;
    const mb = (loadedBytes / (1024 * 1024)).toFixed(2);
    loadingBar.style.display = "block";
    progressBarFull.style.width = Math.min((loadedBytes / (TOTAL_MB * 1024 * 1024)) * 100, 100) + "%";
  }
  const buffer = new Uint8Array(received);
  let offset = 0;
  for (const c of chunks) {
    buffer.set(c, offset);
    offset += c.length;
  }
  return buffer;
}

async function merge(prefix, count) {
  const buffers = [];
  for (let i = 0; i < count; i++) {
    buffers.push(await fetchPart(prefix + i));
  }
  return URL.createObjectURL(new Blob(buffers));
}

// ================== UNITY BOOT ==================
var buildUrl = "Build";
var loaderUrl = buildUrl + "/Crimson Fantasia [WebGL].loader.js";
var config = {
  dataUrl: null, // to be set after merge
  frameworkUrl: buildUrl + "/Crimson Fantasia [WebGL].framework.js",
  codeUrl: null, // to be set after merge
  streamingAssetsUrl: "StreamingAssets",
  companyName: "CROW'S NEST",
  productName: "Crimson Fantasia",
  productVersion: "v1.1.3",
  showBanner: unityShowBanner,
};

(async () => {
  // Merge split files into blobs
  config.dataUrl = await merge(DATA_PREFIX, DATA_PARTS);
  config.codeUrl = await merge(WASM_PREFIX, WASM_PARTS);

  // Load Unity loader and instantiate
  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
      progressBarFull.style.width = 100 * progress + "%";
    }).then((unityInstance) => {
      loadingBar.style.display = "none";
      fullscreenButton.onclick = () => {
        unityInstance.SetFullscreen(1);
      };
    }).catch((message) => {
      alert(message);
    });
  };
  document.body.appendChild(script);
})();

// Resize canvas when window size changes
window.addEventListener("resize", () => {
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
});
</script>
</body>
</html>
