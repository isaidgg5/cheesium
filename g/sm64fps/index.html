<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<title>Unity WebGL Player | Super Mario 64 FPS</title>

<script src="Build/UnityLoader.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #231F20;
}

#unityContainer {
    position: fixed;
    inset: 0;
    display: none;
}

#loading-text {
    color: white;
    font-size: 48px;
    font-family: 'Comic Sans MS', Arial, Helvetica, sans-serif;
    text-align: center;
    margin-top: 40px;
}

#barContainer {
    width: 500px;
    height: 24px;
    background: #333;
    margin: 20px auto;
    border-radius: 12px;
    overflow: hidden;
}

#bar {
    height: 100%;
    width: 0%;
    background: #ff66cc;
}
</style>
</head>

<body>

<div id="loading-text">LOADING...</div>
<div id="barContainer"><div id="bar"></div></div>
<div id="unityContainer"></div>
<script>
/* ================== CONFIG ================== */

const DATA_PREFIX = "Build/build1.data.unityweb.part";
const DATA_PARTS = 4;

const TOTAL_MB = 90.0;

/* ================== UI ================== */

const loadingText = document.getElementById("loading-text");
const barContainer = document.getElementById("barContainer");
const bar = document.getElementById("bar");

let loadedBytes = 0;

/* ================== LOADING ================== */

async function fetchPart(url) {
  const res = await fetch(url);
  const reader = res.body.getReader();
  const chunks = [];
  let received = 0;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    chunks.push(value);
    received += value.length;
    loadedBytes += value.length;

    const mb = (loadedBytes / (1024 * 1024)).toFixed(2);
    loadingText.innerHTML = `LOADING... ${mb} MB / ${TOTAL_MB} MB`;
    bar.style.width =
      Math.min((loadedBytes / (TOTAL_MB * 1024 * 1024)) * 100, 100) + "%";
  }

  const buffer = new Uint8Array(received);
  let offset = 0;
  for (const c of chunks) {
    buffer.set(c, offset);
    offset += c.length;
  }

  return buffer;
}

async function merge(prefix, count) {
  const buffers = [];
  for (let i = 0; i < count; i++) {
    buffers.push(await fetchPart(prefix + i));
  }
  return URL.createObjectURL(new Blob(buffers));
}

/* ================== UNITY BOOT ================== */

(async () => {
  // Merge split data files into a blob
  const dataBlob = await merge(DATA_PREFIX, DATA_PARTS).then(url => fetch(url).then(r => r.arrayBuffer()));

  // Store merged data in memory
  window.unityMergedData = {
    'build1.data.unityweb': dataBlob
  };

  // Intercept XMLHttpRequest to serve merged data
  const originalOpen = XMLHttpRequest.prototype.open;
  const originalSend = XMLHttpRequest.prototype.send;

  XMLHttpRequest.prototype.open = function(method, url, ...args) {
    this._url = url;
    return originalOpen.call(this, method, url, ...args);
  };

  XMLHttpRequest.prototype.send = function(...args) {
    const url = this._url;
    const filename = url ? url.split('/').pop().split('?')[0] : '';

    if (window.unityMergedData[filename]) {
      setTimeout(() => {
        Object.defineProperty(this, 'response', { value: window.unityMergedData[filename], writable: false });
        Object.defineProperty(this, 'responseType', { value: 'arraybuffer', writable: true });
        Object.defineProperty(this, 'status', { value: 200, writable: false });
        Object.defineProperty(this, 'readyState', { value: 4, writable: false });
        this.onload && this.onload();
      }, 0);
      return;
    }

    return originalSend.call(this, ...args);
  };

  // Load config and start Unity
  UnityLoader.instantiate("unityContainer", "Build/build1.json", {
    onProgress: function(instance, progress) {
      if (progress === 1) {
        loadingText.remove();
        barContainer.remove();
        document.getElementById("unityContainer").style.display = "block";
      }
    }
  });
})();
</script>

</body>
</html>
