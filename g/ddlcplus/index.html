<!doctype html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Doki Doki Literature Club! Plus</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />
  
  <link rel="icon" href="icons/icon-72x72.png" sizes="72x72" type="image/png" />
  <link rel="icon" href="icons/icon-192x192.png" sizes="192x192" type="image/png" />
  <link rel="icon" href="icons/icon-512x512.png" sizes="512x512" type="image/png" />

  <style>
    html { background: #444; font-family: sans-serif; }
    body, html { overscroll-behavior: none; margin: 0; padding: 0; overflow: hidden; height: 100%; }

    #canvas, #overlayDiv {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0 none;
    }
    #canvas { background: #000; }

    .visible { visibility: visible; opacity: 1.0; transition: opacity .1s linear; }
    .hidden { visibility: hidden; opacity: 0; transition: visibility 0s .25s, opacity .25s linear; }

    /* Custom Pink Progress Bar Styling */
    #statusDiv {
      background: rgba(0, 0, 0, 0.8);
      width: 50%; margin: auto; min-width: 340px; padding: 20px;
      position: absolute; top: 20%; left: 0; right: 0;
      border-radius: 10px; z-index: 100; text-align: center;
    }
    #statusTextDiv { color: #ccc; font-size: 14px; margin-bottom: 10px; }
    #statusProgress { width: 100%; height: 12px; accent-color: #F5A9B8; }
    #statusProgress::-webkit-progress-value { background-color: #F5A9B8; }
    #statusProgress::-moz-progress-bar { background-color: #F5A9B8; }

    #presplash {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        object-fit: contain; z-index: 50; background: black;
    }

    /* Ren'Py Input Dialog Styling */
    #inputDiv {
      position: absolute; top: 10%; left: 0; right: 0; margin: auto;
      width: 65%; padding: 20px; background: rgba(0, 0, 0, 0.85);
      border-radius: 5px; color: white; z-index: 200;
    }
    #inputText { width: 100%; font-size: 150%; background: #222; color: #eee; border: 1px solid #F5A9B8; }

    #ContextContainer { position: absolute; left: 0; top: 0; color: white; z-index: 150; }
    #ContextButton { cursor: pointer; padding: 10px; font-size: 30px; color: lightgrey; text-decoration: none; display: block; }
    #ContextMenu a {
      text-decoration: none; color: lightgrey; background: #333;
      height: 40px; width: 200px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center; margin: 5px;
    }
  </style>
</head>

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="overlayDiv"></div>

  <img id="presplash" src="web-presplash.jpg">

  <div id="ContextContainer">
    <a id="ContextButton" onclick="const m=document.getElementById('ContextMenu'); m.style.display=m.style.display==='none'?'block':'none';">&#8801;</a>
    <div id="ContextMenu" style="display: none;">
      <input id="ID_SavegamesImport" type="file" onchange="onSavegamesImport(this)" accept="application/zip" style="display:none"></input>
      <a href="javascript:document.getElementById('ID_SavegamesImport').click();">Import Saves</a>
      <a href="javascript:onSavegamesExport();">Export Saves</a>
      <a href="javascript:FSDownload('/log.txt', 'text/plain');">Download Log</a>
    </div>
  </div>

  <div id="statusDiv">
    <div id="statusTextDiv">Preparing files...</div>
    <progress id="statusProgress" value="0" max="100"></progress>
  </div>

  <div id="inputDiv" class="hidden">
    <form id="inputForm">
      <div id="inputPrompt"></div>
      <input id="inputText" type="text">
    </form>
  </div>

  <script>
    const totalParts = 17;
    const partBaseName = 'game.zip.part';

    async function loadSplitGameZip() {
        const statusText = document.getElementById('statusTextDiv');
        const statusProgress = document.getElementById('statusProgress');
        const statusDiv = document.getElementById('statusDiv');
        const presplash = document.getElementById('presplash');

        try {
            statusProgress.max = totalParts;
            let downloadedCount = 0;

            const downloadPromises = Array.from({ length: totalParts }, async (_, i) => {
                const response = await fetch(`${partBaseName}${i}`);
                if (!response.ok) throw new Error(`Missing: ${partBaseName}${i}`);
                
                const buffer = await response.arrayBuffer();
                downloadedCount++;
                
                statusProgress.value = downloadedCount;
                statusText.innerText = `Downloading Data: ${downloadedCount} / ${totalParts}`;
                
                return { index: i, buffer };
            });

            const results = await Promise.all(downloadPromises);
            results.sort((a, b) => a.index - b.index);
            
            statusText.innerText = "Reassembling assets...";
            const combinedBlob = new Blob(results.map(r => r.buffer), { type: 'application/zip' });
            window.gameZipURL = URL.createObjectURL(combinedBlob);
            
            statusText.innerText = "Starting engine...";

            // Load renpy.js dynamically
            const script = document.createElement('script');
            script.src = "renpy.js";
            script.async = true;
            document.body.appendChild(script);

            // Hide loading UI once game starts
            const checkReady = setInterval(() => {
                if (window.RENPY_START_TIME) {
                    statusDiv.classList.add('hidden');
                    presplash.classList.add('hidden');
                    clearInterval(checkReady);
                }
            }, 500);

        } catch (e) {
            statusText.innerHTML = `<span style="color:#F5A9B8">Error: ${e.message}</span>`;
        }
    }

    if (navigator.serviceWorker && !navigator.serviceWorker.controller) {
        navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'all' });
    }

    window.addEventListener('load', loadSplitGameZip);
  </script>

  <script src="renpy-pre.js"></script>
</body>
</html>
