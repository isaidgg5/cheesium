<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nostalgist.js Test</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 20px;
    }

    #game-container {
      max-width: 800px;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border: 2px solid #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .controls {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="file"] {
      padding: 8px 12px;
      background: #2a2a2a;
      color: white;
      border: 2px solid #4CAF50;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    input[type="file"]:disabled {
      border-color: #666;
      cursor: not-allowed;
      opacity: 0.6;
    }

    button {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #45a049;
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
    }

    .info {
      margin-top: 20px;
      padding: 15px;
      background: #2a2a2a;
      border-radius: 4px;
      max-width: 800px;
      width: 100%;
    }

    .info p {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>Pokemon FireRed</h1>
  
  <div class="controls">
    <button id="load-homebrew-btn">Load Homebrew ROM</button>
    <span style="margin: 0 10px;">OR</span>
    <input type="file" id="rom-file" accept=".gba">
    <button id="start-btn" disabled>Start Game</button>
    <button id="pause-btn" disabled>Pause</button>
    <button id="resume-btn" disabled>Resume</button>
    <button id="reset-btn" disabled>Reset</button>
  </div>

  <div id="game-container"></div>

  <div class="info">
    <h3>Controls:</h3>
    <p><strong>Arrow Keys:</strong> D-Pad</p>
    <p><strong>Z:</strong> A Button</p>
    <p><strong>X:</strong> B Button</p>
    <p><strong>Enter:</strong> Start</p>
    <p><strong>Shift:</strong> Select</p>
  </div>

  <!-- Load Nostalgist.js from CDN -->
  <script type="module">
    import { Nostalgist } from 'https://cdn.jsdelivr.net/npm/nostalgist@latest/dist/nostalgist.js';

    let nostalgist;
    let romFile;
    const romInput = document.getElementById('rom-file');
    const loadHomebrewBtn = document.getElementById('load-homebrew-btn');
    const startBtn = document.getElementById('start-btn');
    const pauseBtn = document.getElementById('pause-btn');
    const resumeBtn = document.getElementById('resume-btn');
    const resetBtn = document.getElementById('reset-btn');

    // Function to load and start the game
    async function loadGame(romSource) {
      startBtn.disabled = true;
      loadHomebrewBtn.disabled = true;
      startBtn.textContent = 'Loading...';

      try {
        nostalgist = await Nostalgist.gba(romSource, {
          element: document.getElementById('game-container'),
        });

        pauseBtn.disabled = false;
        resetBtn.disabled = false;
        startBtn.textContent = 'Started!';
        romInput.disabled = true;
        
        console.log('Game loaded successfully!');
      } catch (error) {
        console.error('Error loading game:', error);
        startBtn.disabled = false;
        loadHomebrewBtn.disabled = false;
        startBtn.textContent = 'Start Game';
        romInput.disabled = false;
        alert('Error loading game: ' + error.message);
      }
    }

    // Load homebrew ROM from server
    loadHomebrewBtn.addEventListener('click', async () => {
      loadHomebrewBtn.disabled = true;
      loadHomebrewBtn.textContent = 'Loading...';
      
      try {
        // Fetch the ROM file from your server
        const response = await fetch('/emulation/roms/PokemonFireRed_Version.gba');
        if (!response.ok) throw new Error('ROM file not found');
        
        const blob = await response.blob();
        const file = new File([blob], 'PokemonFireRed_Version.gba', { type: 'application/octet-stream' });
        
        await loadGame(file);
      } catch (error) {
        console.error('Error fetching ROM:', error);
        loadHomebrewBtn.disabled = false;
        loadHomebrewBtn.textContent = 'Load Homebrew ROM';
        alert('Could not load ROM from server: ' + error.message);
      }
    });

    // Enable start button when ROM file is selected
    romInput.addEventListener('change', (e) => {
      romFile = e.target.files[0];
      if (romFile) {
        startBtn.disabled = false;
        startBtn.textContent = 'Start Game';
      }
    });

    // Load user-selected ROM file
    startBtn.addEventListener('click', async () => {
      if (!romFile) return;
      await loadGame(romFile);
    });

    pauseBtn.addEventListener('click', async () => {
      if (nostalgist) {
        await nostalgist.pause();
        pauseBtn.disabled = true;
        resumeBtn.disabled = false;
      }
    });

    resumeBtn.addEventListener('click', async () => {
      if (nostalgist) {
        await nostalgist.resume();
        pauseBtn.disabled = false;
        resumeBtn.disabled = true;
      }
    });

    resetBtn.addEventListener('click', async () => {
      if (nostalgist) {
        await nostalgist.restart();
      }
    });

    // Save state example (optional)
    // To save state: const state = await nostalgist.saveState();
    // To load state: await nostalgist.loadState(state);
  </script>
</body>
</html>
